name: CI

on:
  push:
    branches: [master, v2]
  pull_request:
    branches: [master, v2]
  schedule:
    # Weekly run to catch upstream Cloudflare API drift.
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  unit:
    name: Unit tests (no network)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y dnsutils iproute2
      - name: Run unit + install tests
        run: uv run --no-project --python 3.12 python -m unittest -v tests.test_unit tests.test_install

  integration:
    name: Integration tests (real Cloudflare)
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y dnsutils iproute2
      - name: Prepare cache directory
        run: sudo mkdir -p /var/cache/cf-ddns && sudo chmod 1777 /var/cache/cf-ddns
      - name: Check secrets availability
        id: secrets
        run: |
          if [ -n "${{ secrets.CF_API_TOKEN }}" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Integration secrets not configured; tests will skip."
          fi
      - name: Run integration tests
        if: steps.secrets.outputs.available == 'true'
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
          CF_TEST_HOSTNAME: ${{ secrets.CF_TEST_HOSTNAME }}
        run: uv run --no-project --python 3.12 python -m unittest -v tests.test_integration
